name: CI/CD Gold Standard Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    paths-ignore: # or git commit -m "docs: update README [skip ci] in commit message to bypass CI for doc changes"
      - 'README.md'
      - 'docs/**'
      - '.gitignore'
      - '.dockerignore'

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. PYTHON LINTING (Is the code clean?)
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Lint
        run: ruff check .

      # 2. DOCKER LINTING (Is the recipe clean?)
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # 3. UNIT TESTS (Does the logic work?)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Unit Tests
        run: pytest test_app.py

      # 4. BUILD IMAGE (Create the container for scanning)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build for Scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/flask-app:test-scan

      # 5. SECURITY SCAN (Is the container safe?)
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/flask-app:test-scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          # ADD THIS LINE TO BYPASS THE SPECIFIC CVES:
          trivyignore: .trivyignore

# ... (Keep the Quality/Security job the same as before)

deploy:
    needs: quality-and-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    # Fully dynamic environment block
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPO_NAME }} 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Configure AWS (Uses vars via env block)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build and Push (Uses Registry output + Env + GitHub Context)
      - name: Build, Tag, and Push to ECR
        run: |
          # Capture the registry URL from the login step
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          
          # Build using the Git Commit SHA as the unique version tag
          docker build -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          
          # Push the SHA-tagged version (Traceability)
          docker push $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          
          # Tag and Push as 'latest' (Convenience for deployment)
          docker tag $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:latest